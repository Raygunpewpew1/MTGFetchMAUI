name: Update Trimmed MTG Database
on:
  schedule:
    - cron: '0 12 * * 2'
  workflow_dispatch:
jobs:
  trim-and-host:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Use Node 24 for JS actions (GitHub default after 2026-06-02); silences Node 20 deprecation warnings.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Generate Release Tag
        id: date
        run: echo "tag=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Download MTGJSON SQLite Zip
        run: curl -L -o AllPrintings.sqlite.zip "https://mtgjson.com/api/v5/AllPrintings.sqlite.zip"

      - name: Extract Database
        run: unzip AllPrintings.sqlite.zip

      # Requires scripts/normalize_mtg_sqlite_columns.py on the branch this workflow runs from (commit + push it).
      - name: Normalize list columns to JSON arrays
        working-directory: ${{ github.workspace }}
        run: |
          if [ ! -f scripts/normalize_mtg_sqlite_columns.py ]; then
            echo "::error title=Missing normalization script::Expected scripts/normalize_mtg_sqlite_columns.py after checkout — add it on this branch and push, or merge to default."
            ls -la
            ls -la scripts 2>/dev/null || echo "(no scripts/ directory)"
            exit 1
          fi
          python3 scripts/normalize_mtg_sqlite_columns.py AllPrintings.sqlite

      - name: Drop Heavy Tables, Add FTS & Indexes, Vacuum
        run: |
          sqlite3 AllPrintings.sqlite <<'SQLEOF'
          DROP TABLE IF EXISTS cardForeignData;
          DROP TABLE IF EXISTS setBoosterContents;
          DROP TABLE IF EXISTS setBoosterContentWeights;
          DROP TABLE IF EXISTS setBoosterSheetCards;
          DROP TABLE IF EXISTS setBoosterSheets;
          DROP TABLE IF EXISTS setTranslations;

          -- FTS5 table for fast name/oracle/type/artist/set search (cards + tokens)
          CREATE VIRTUAL TABLE IF NOT EXISTS av_cards_fts USING fts5(
            uuid UNINDEXED,
            name,
            faceName,
            text,
            type,
            artist,
            setName,
            tokenize='unicode61'
          );

          INSERT INTO av_cards_fts(uuid, name, faceName, text, type, artist, setName)
          SELECT c.uuid, COALESCE(c.name,''), COALESCE(c.faceName,''), COALESCE(c.text,''), COALESCE(c.type,''), COALESCE(c.artist,''), COALESCE(s.name,'')
          FROM cards c LEFT JOIN sets s ON c.setCode = s.code;

          INSERT INTO av_cards_fts(uuid, name, faceName, text, type, artist, setName)
          SELECT t.uuid, COALESCE(t.name,''), COALESCE(t.faceName,''), COALESCE(t.text,''), COALESCE(t.type,''), COALESCE(t.artist,''), COALESCE(s.name,'')
          FROM tokens t LEFT JOIN sets s ON t.setCode = s.code;

          -- Indexes for filters used by MTGSearchHelper
          CREATE INDEX IF NOT EXISTS idx_cards_setCode ON cards(setCode);
          CREATE INDEX IF NOT EXISTS idx_cards_name ON cards(name);
          CREATE INDEX IF NOT EXISTS idx_cards_faceName ON cards(faceName);
          CREATE INDEX IF NOT EXISTS idx_cards_manaValue ON cards(manaValue);
          CREATE INDEX IF NOT EXISTS idx_cards_rarity ON cards(rarity);
          CREATE INDEX IF NOT EXISTS idx_cards_side ON cards(side);
          CREATE INDEX IF NOT EXISTS idx_cardIdentifiers_scryfallId ON cardIdentifiers(scryfallId);
          CREATE INDEX IF NOT EXISTS idx_cardLegalities_uuid ON cardLegalities(uuid);
          CREATE INDEX IF NOT EXISTS idx_tokens_setCode ON tokens(setCode);
          CREATE INDEX IF NOT EXISTS idx_tokens_uuid ON tokens(uuid);

          VACUUM;
          SQLEOF

      - name: Zip the Final Database
        run: zip -9 MTG_App_DB.zip AllPrintings.sqlite

      - name: Build AtomicCards SQLite (compact catalog)
        run: |
          curl -L -o AtomicCards.json.zip "https://mtgjson.com/api/v5/AtomicCards.json.zip"
          python3 scripts/build_atomic_sqlite.py AtomicCards.json.zip
          sqlite3 AtomicCards.sqlite "SELECT 1 FROM pragma_table_info('atomic_cards') WHERE name='identifiers_json' LIMIT 1;" | grep -q .
          zip -9 AtomicCards.sqlite.zip AtomicCards.sqlite

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.date.outputs.tag }}
          name: MTG Database Update (${{ steps.date.outputs.tag }})
          files: |
            MTG_App_DB.zip
            AtomicCards.sqlite.zip
          make_latest: true

      # Action is archived (no Node 24 update); job env FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 runs it on Node 24.
      - name: Delete Old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
