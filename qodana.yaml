# ------------------------------------------------------------------------------
# Qodana (.NET) — AetherVault
# Docs: https://www.jetbrains.com/help/qodana/qodana-dotnet.html
# ------------------------------------------------------------------------------
# Keep this file small: avoid huge custom `include:` lists — Qodana / IDE sync
# tends to rewrite them. Prefer `profile` + optional `exclude:` for noise.
# ------------------------------------------------------------------------------

version: "1.0"

# Rider-based .NET linter (QDNET)
ide: QDNET

profile:
  # CI-friendly superset; use qodana.starter for fewer findings
  name: qodana.recommended

dotnet:
  solution: AetherVault.sln
  configuration: Release

# Helps source generators / MAUI resolve packages inside the Qodana container.
# If restore still fails on Linux, install workloads in CI before the scan step.
bootstrap: |
  dotnet restore AetherVault.sln --verbosity minimal
