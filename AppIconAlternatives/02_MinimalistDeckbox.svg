<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14111E" />
      <stop offset="100%" stop-color="#2A243A" />
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="4" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Card Colors -->
    <!-- WUBRG -->
    <linearGradient id="cardW" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#D4D0C5"/></linearGradient>
    <linearGradient id="cardU" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0E68AB"/><stop offset="100%" stop-color="#073A66"/></linearGradient>
    <linearGradient id="cardB" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4F4F4F"/><stop offset="100%" stop-color="#1A1A1A"/></linearGradient>
    <linearGradient id="cardR" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D3202A"/><stop offset="100%" stop-color="#800000"/></linearGradient>
    <linearGradient id="cardG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00733E"/><stop offset="100%" stop-color="#004020"/></linearGradient>

    <!-- Base Deckbox -->
    <linearGradient id="boxFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A3355" />
      <stop offset="100%" stop-color="#1E1A2D" />
    </linearGradient>

    <!-- Accents -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGrad)" />

  <!-- Radiating Aether Lines behind the box -->
  <g stroke="#A57CF0" stroke-width="4" opacity="0.3">
    <line x1="512" y1="512" x2="512" y2="0" />
    <line x1="512" y1="512" x2="1024" y2="512" />
    <line x1="512" y1="512" x2="512" y2="1024" />
    <line x1="512" y1="512" x2="0" y2="512" />
    <line x1="512" y1="512" x2="874" y2="150" />
    <line x1="512" y1="512" x2="874" y2="874" />
    <line x1="512" y1="512" x2="150" y2="874" />
    <line x1="512" y1="512" x2="150" y2="150" />
  </g>

  <!-- Group for fanned cards coming OUT of the box -->
  <g filter="url(#shadow)">
    <!-- Black Card (Far Right) -->
    <g transform="translate(512, 512) rotate(30) translate(-512, -512)">
      <rect x="420" y="200" width="184" height="260" rx="16" fill="url(#cardB)" stroke="#3A3A3A" stroke-width="4" />
    </g>
    <!-- Red Card (Far Left) -->
    <g transform="translate(512, 512) rotate(-30) translate(-512, -512)">
      <rect x="420" y="200" width="184" height="260" rx="16" fill="url(#cardR)" stroke="#800000" stroke-width="4" />
    </g>
    <!-- Green Card (Mid Right) -->
    <g transform="translate(512, 512) rotate(15) translate(-512, -512)">
      <rect x="420" y="180" width="184" height="260" rx="16" fill="url(#cardG)" stroke="#004020" stroke-width="4" />
    </g>
    <!-- White Card (Mid Left) -->
    <g transform="translate(512, 512) rotate(-15) translate(-512, -512)">
      <rect x="420" y="180" width="184" height="260" rx="16" fill="url(#cardW)" stroke="#A0A0A0" stroke-width="4" />
    </g>
    <!-- Blue Card (Center) -->
    <rect x="420" y="160" width="184" height="260" rx="16" fill="url(#cardU)" stroke="#073A66" stroke-width="4" />

    <!-- Glowing emblem on the center card -->
    <path d="M512 240 L550 280 L512 320 L474 280 Z" fill="none" stroke="#00FFFF" stroke-width="4" filter="url(#glow)" />
  </g>

  <!-- The Deckbox (Front layer over cards) -->
  <path d="M280 480
           L744 480
           C766 480, 784 498, 784 520
           L744 860
           C744 882, 726 900, 704 900
           L320 900
           C298 900, 280 882, 280 860
           L240 520
           C240 498, 258 480, 280 480 Z" fill="url(#boxFront)" filter="url(#shadow)" stroke="url(#gold)" stroke-width="8" />

  <!-- Box Top Flap Opening -->
  <path d="M250 500 L774 500 L512 650 Z" fill="#14111E" opacity="0.6" />
  <path d="M280 480 L744 480 L512 600 Z" fill="none" stroke="url(#gold)" stroke-width="8" />

  <!-- Lock Emblem on Box -->
  <circle cx="512" cy="720" r="50" fill="#2A243A" stroke="url(#gold)" stroke-width="8" filter="url(#shadow)" />
  <circle cx="512" cy="720" r="30" fill="url(#gold)" />
  <!-- Keyhole shape -->
  <path d="M512 705 A 12 12 0 1 0 512 730 L520 745 L504 745 Z" fill="#14111E" />
</svg>