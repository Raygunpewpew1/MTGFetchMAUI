<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1525" />
      <stop offset="100%" stop-color="#0A0710" />
    </linearGradient>

    <!-- Metal Gradient for Vault Elements -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B9BB4" />
      <stop offset="50%" stop-color="#4C5870" />
      <stop offset="100%" stop-color="#2D354A" />
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE066" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7900" />
    </linearGradient>

    <!-- Glow for center -->
    <radialGradient id="aetherGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A90E2" stop-opacity="0.8" />
      <stop offset="60%" stop-color="#9013FE" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#1A1525" stop-opacity="0" />
    </radialGradient>

    <!-- WUBRG Colors -->
    <radialGradient id="gradW" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#E8E4C9"/></radialGradient>
    <radialGradient id="gradU" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#73C2FB"/><stop offset="100%" stop-color="#0066CC"/></radialGradient>
    <radialGradient id="gradB" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#666666"/><stop offset="100%" stop-color="#1A1A1A"/></radialGradient>
    <radialGradient id="gradR" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#FF6B6B"/><stop offset="100%" stop-color="#CC0000"/></radialGradient>
    <radialGradient id="gradG" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#7CD97C"/><stop offset="100%" stop-color="#008000"/></radialGradient>

    <filter id="dropShadow">
      <feDropShadow dx="0" dy="15" stdDeviation="10" flood-opacity="0.5" flood-color="#000"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)" />

  <!-- Aether Glow Background -->
  <circle cx="512" cy="512" r="400" fill="url(#aetherGlow)" />

  <!-- Outer Vault Frame -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="url(#metalGrad)" stroke-width="40" filter="url(#dropShadow)" />
  <circle cx="512" cy="512" r="390" fill="none" stroke="#1A1A1A" stroke-width="8" />

  <!-- Gear Teeth / Vault Locking Mechanism -->
  <g fill="url(#metalGrad)" filter="url(#dropShadow)">
    <path d="M482 62 h60 v60 h-60 z" />
    <path d="M482 902 h60 v60 h-60 z" />
    <path d="M62 482 h60 v60 h-60 z" />
    <path d="M902 482 h60 v60 h-60 z" />

    <g transform="rotate(45, 512, 512)">
      <path d="M482 62 h60 v60 h-60 z" />
      <path d="M482 902 h60 v60 h-60 z" />
      <path d="M62 482 h60 v60 h-60 z" />
      <path d="M902 482 h60 v60 h-60 z" />
    </g>
  </g>

  <!-- Inner Door Segmented Ring (WUBRG representation) -->
  <circle cx="512" cy="512" r="280" fill="#14111E" stroke="url(#goldGrad)" stroke-width="20" filter="url(#dropShadow)" />

  <!-- Central Emblem / Aether Core -->
  <path d="M512 332 L668 512 L512 692 L356 512 Z" fill="url(#goldGrad)" filter="url(#dropShadow)" />
  <path d="M512 360 L635 512 L512 664 L389 512 Z" fill="url(#bgGrad)" />
  <path d="M512 400 L590 512 L512 624 L434 512 Z" fill="#4A90E2" opacity="0.8" />

  <!-- Glowing core center -->
  <circle cx="512" cy="512" r="40" fill="#FFFFFF" opacity="0.9" />

  <!-- 5 WUBRG Orbs inset in the gold ring -->
  <!-- Top: White -->
  <circle cx="512" cy="230" r="30" fill="url(#gradW)" stroke="#D4AF37" stroke-width="4" filter="url(#dropShadow)" />
  <!-- Top Right: Blue -->
  <circle cx="780" cy="425" r="30" fill="url(#gradU)" stroke="#D4AF37" stroke-width="4" filter="url(#dropShadow)" />
  <!-- Bottom Right: Black -->
  <circle cx="678" cy="740" r="30" fill="url(#gradB)" stroke="#D4AF37" stroke-width="4" filter="url(#dropShadow)" />
  <!-- Bottom Left: Red -->
  <circle cx="346" cy="740" r="30" fill="url(#gradR)" stroke="#D4AF37" stroke-width="4" filter="url(#dropShadow)" />
  <!-- Top Left: Green -->
  <circle cx="244" cy="425" r="30" fill="url(#gradG)" stroke="#D4AF37" stroke-width="4" filter="url(#dropShadow)" />

</svg>