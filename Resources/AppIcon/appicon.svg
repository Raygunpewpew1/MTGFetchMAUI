<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#141E30" />
            <stop offset="100%" stop-color="#243B55" />
        </linearGradient>
        
        <linearGradient id="aether" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4E65FF" />
            <stop offset="100%" stop-color="#92EFFD" />
        </linearGradient>
        
        <linearGradient id="vault" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD700" />
            <stop offset="50%" stop-color="#FFA500" />
            <stop offset="100%" stop-color="#B8860B" />
        </linearGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="512" height="512" rx="115" fill="url(#bg)" />

    <polygon points="256,50 430,150 430,362 256,462 82,362 82,150" 
             fill="none" stroke="url(#vault)" stroke-width="24" stroke-linejoin="round"/>
             
    <polygon points="256,90 395,170 395,342 256,422 117,342 117,170" 
             fill="none" stroke="#4a6583" stroke-width="8" stroke-linejoin="round" opacity="0.7"/>

    <g transform="translate(256, 266)">
        
        <g transform="translate(-45, 15) rotate(-25)">
            <rect x="-60" y="-85" width="120" height="170" rx="12" 
                  fill="#2A2A35" stroke="#8A8A9B" stroke-width="4" />
            <rect x="-50" y="-75" width="100" height="150" rx="8" 
                  fill="none" stroke="#454555" stroke-width="2" />
        </g>

        <g transform="translate(45, 15) rotate(25)">
            <rect x="-60" y="-85" width="120" height="170" rx="12" 
                  fill="#2A2A35" stroke="#8A8A9B" stroke-width="4" />
            <rect x="-50" y="-75" width="100" height="150" rx="8" 
                  fill="none" stroke="#454555" stroke-width="2" />
        </g>

        <g transform="translate(0, -10)">
            <rect x="-65" y="-95" width="130" height="190" rx="14" 
                  fill="url(#aether)" stroke="#FFFFFF" stroke-width="6" filter="url(#glow)"/>
            
            <rect x="-53" y="-83" width="106" height="166" rx="8" 
                  fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
                  
            <polygon points="0,-45 28,0 0,45 -28,0" fill="#FFFFFF" opacity="0.95"/>
            <polygon points="0,-25 14,0 0,25 -14,0" fill="#4E65FF" opacity="0.8"/>
        </g>
    </g>
</svg>