<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#14121F"></rect>

  <!-- Outer Vault Ring Base -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="#2A243A" stroke-width="120"></circle>

  <!-- 5 Mana Color Segments -->
  <!-- Each path is a 72° arc -->

  <!-- White -->
  <path d="M512 152
           A360 360 0 0 1 855 362" fill="none" stroke="#F8E7B9" stroke-width="120" stroke-linecap="round"></path>

  <!-- Blue -->
  <path d="M855 362
           A360 360 0 0 1 735 775" fill="none" stroke="#0E68AB" stroke-width="120" stroke-linecap="round"></path>

  <!-- Black -->
  <path d="M735 775
           A360 360 0 0 1 289 775" fill="none" stroke="#1C1C1C" stroke-width="120" stroke-linecap="round"></path>

  <!-- Red -->
  <path d="M289 775
           A360 360 0 0 1 169 362" fill="none" stroke="#D3202A" stroke-width="120" stroke-linecap="round"></path>

  <!-- Green -->
  <path d="M169 362
           A360 360 0 0 1 512 152" fill="none" stroke="#00733E" stroke-width="120" stroke-linecap="round"></path>

  <!-- Inner Vault Core -->
  <circle cx="512" cy="512" r="200" fill="#1E1A2D"></circle>

  <!-- Subtle Inner Ring -->
  <circle cx="512" cy="512" r="150" fill="none" stroke="#3B3355" stroke-width="6" opacity="0.6"></circle>

</svg>