<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep cosmic background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#130C24" />
      <stop offset="50%" stop-color="#1B1035" />
      <stop offset="100%" stop-color="#05030A" />
    </linearGradient>

    <!-- Central aether glow -->
    <radialGradient id="coreGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4AF2FF" stop-opacity="0.9" />
      <stop offset="35%" stop-color="#5C6BFF" stop-opacity="0.55" />
      <stop offset="75%" stop-color="#9E4BFF" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Vault ring -->
    <linearGradient id="ringGrad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#FFE59D" />
      <stop offset="45%" stop-color="#FFC857" />
      <stop offset="100%" stop-color="#D28B26" />
    </linearGradient>

    <!-- Inner ring surface -->
    <linearGradient id="innerRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2538" />
      <stop offset="100%" stop-color="#0F131F" />
    </linearGradient>

    <!-- Aether arc gradient -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4AF2FF" />
      <stop offset="50%" stop-color="#7C6CFF" />
      <stop offset="100%" stop-color="#FF6BD5" />
    </linearGradient>

    <!-- Soft outer shadow -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.7" />
    </filter>
  </defs>

  <!-- Rounded-rect background (platforms will still mask, but this keeps corners soft in previews) -->
  <rect x="64" y="64" width="896" height="896" rx="240" ry="240" fill="url(#bgGrad)" />

  <!-- Subtle vignette to focus toward center -->
  <rect x="64" y="64" width="896" height="896" rx="240" ry="240" fill="#000000" opacity="0.20" />

  <!-- Aether glow behind the vault -->
  <circle cx="512" cy="480" r="360" fill="url(#coreGlow)" />

  <!-- Vault ring -->
  <g filter="url(#softShadow)">
    <circle cx="512" cy="512" r="310" fill="none" stroke="url(#ringGrad)" stroke-width="38" />
    <circle cx="512" cy="512" r="268" fill="url(#innerRingGrad)" stroke="#090B12" stroke-width="10" />
  </g>

  <!-- Aether arcs / energy swirl -->
  <g transform="translate(512 512) rotate(-18)">
    <!-- Upper-left sweeping arc -->
    <path
      d="M -210 0 A 210 210 0 0 1 0 -210"
      fill="none"
      stroke="url(#arcGrad)"
      stroke-width="32"
      stroke-linecap="round" />

    <!-- Lower-right sweeping arc -->
    <path
      d="M 0 210 A 210 210 0 0 1 210 0"
      fill="none"
      stroke="url(#arcGrad)"
      stroke-width="22"
      stroke-linecap="round"
      opacity="0.85" />

    <!-- Dark core -->
    <circle cx="0" cy="0" r="88" fill="#050813" />

    <!-- Inner dashed energy ring -->
    <circle
      cx="0"
      cy="0"
      r="72"
      fill="none"
      stroke="url(#arcGrad)"
      stroke-width="10"
      stroke-linecap="round"
      stroke-dasharray="36 20"
      opacity="0.8" />
  </g>

  <!-- Highlights and shadow along the ring to keep shape readable at small sizes -->
  <path
    d="M 202 512 A 310 310 0 0 1 512 202"
    fill="none"
    stroke="#FFFFFF"
    stroke-opacity="0.22"
    stroke-width="18"
    stroke-linecap="round" />

  <path
    d="M 822 512 A 310 310 0 0 1 512 822"
    fill="none"
    stroke="#000000"
    stroke-opacity="0.35"
    stroke-width="24"
    stroke-linecap="round" />
</svg>