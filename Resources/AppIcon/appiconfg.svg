<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="borderGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <!-- Teal glowing border (squircle outline) -->
    <rect x="24" y="24" width="464" height="464" rx="99" 
          fill="none" stroke="#2dd4bf" stroke-width="20" 
          stroke-linejoin="round" filter="url(#borderGlow)" />
    <!-- Letter A: left diagonal, right diagonal, crossbar (stroked for clean look) -->
    <path d="M 256 128 L 200 392 M 256 128 L 312 392 M 218 278 L 294 278" 
          fill="none" stroke="#2dd4bf" stroke-width="36" 
          stroke-linecap="round" stroke-linejoin="round" />
</svg>
